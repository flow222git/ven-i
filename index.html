<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>問易 · 狀態鏡子</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#23211c; --ink-soft:#5c574c; --ink-faint:#938c7e;
    --paper:#f6f3ec; --card:#fffdf8; --line:#e4ddcf;
    --accent:#3a5a52; --accent-soft:#e8efe9;
    /* 三態色 */
    --good:#3a7a5a; --good-soft:#e6f1ea;
    --neutral:#5b6b7a; --neutral-soft:#e9eef2;
    --lack:#9a6a4a; --lack-soft:#f3e7dd;
    --radius:16px; --maxw:560px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:"Noto Sans TC",sans-serif;
    font-weight:300;line-height:1.7;letter-spacing:.01em;padding:0 18px env(safe-area-inset-bottom)}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:28px 0 120px}
  header{display:flex;align-items:baseline;gap:10px;margin-bottom:6px}
  .logo{font-family:"Noto Serif TC",serif;font-weight:700;font-size:22px;letter-spacing:.08em}
  .sub{font-size:12px;color:var(--ink-faint);letter-spacing:.18em}
  .tagline{font-size:13px;color:var(--ink-soft);margin:0 0 26px;line-height:1.6}
  .progress{display:flex;gap:6px;margin-bottom:26px}
  .progress i{flex:1;height:3px;border-radius:3px;background:var(--line);transition:.4s}
  .progress i.on{background:var(--accent)}
  .step{animation:rise .5s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .q-eyebrow{font-size:12px;letter-spacing:.2em;color:var(--accent);margin-bottom:8px;font-weight:500}
  h2.q{font-family:"Noto Serif TC",serif;font-weight:500;font-size:21px;line-height:1.5;margin:0 0 4px}
  .q-hint{font-size:13px;color:var(--ink-faint);margin:0 0 20px}
  .opt{display:block;width:100%;text-align:left;cursor:pointer;background:var(--card);
    border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;margin-bottom:10px;
    font-size:15px;color:var(--ink);font-family:inherit;font-weight:300;line-height:1.5;transition:.18s;
    display:flex;align-items:center;gap:12px}
  .opt:active{transform:scale(.99)}
  .opt .mark{flex:none;width:20px;height:20px;border-radius:50%;border:1.5px solid var(--line);
    display:flex;align-items:center;justify-content:center;transition:.18s}
  .opt.sel{border-color:var(--accent);background:var(--accent-soft)}
  .opt.sel .mark{border-color:var(--accent);background:var(--accent)}
  .opt.sel .mark::after{content:"";width:7px;height:7px;border-radius:50%;background:#fff}
  .group-label{font-size:12px;color:var(--ink-faint);letter-spacing:.12em;margin:22px 0 10px;font-weight:500}
  .group-label:first-of-type{margin-top:4px}
  textarea{width:100%;min-height:120px;background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius);padding:15px 16px;font-family:inherit;font-size:15px;font-weight:300;
    color:var(--ink);line-height:1.6;resize:vertical}
  textarea:focus{outline:none;border-color:var(--accent)}
  textarea::placeholder{color:var(--ink-faint)}
  .bar{position:fixed;left:0;right:0;bottom:0;padding:14px 18px calc(14px + env(safe-area-inset-bottom));
    background:linear-gradient(to top,var(--paper) 70%,transparent)}
  .bar-inner{max-width:var(--maxw);margin:0 auto;display:flex;gap:10px;align-items:center}
  .btn{flex:1;border:none;border-radius:999px;padding:15px;font-family:"Noto Serif TC",serif;
    font-size:16px;letter-spacing:.05em;cursor:pointer;transition:.18s}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:disabled{background:var(--line);color:var(--ink-faint);cursor:not-allowed}
  .btn-primary:active:not(:disabled){transform:scale(.98)}
  .btn-ghost{flex:none;background:none;border:none;color:var(--ink-faint);font-size:14px;cursor:pointer;padding:15px 4px;font-family:inherit}

  /* 回放確認 */
  .replay{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px 20px;margin-bottom:8px}
  .replay .lead{font-size:15px;line-height:1.7;color:var(--ink);margin:0 0 4px}
  .replay .hexname{font-family:"Noto Serif TC",serif;font-weight:700;color:var(--accent)}

  /* 報告 */
  .report .tone-badge{display:inline-flex;align-items:center;gap:7px;font-size:12px;letter-spacing:.12em;
    padding:6px 14px;border-radius:999px;margin-bottom:12px;font-weight:500}
  .tone-good{background:var(--good-soft);color:var(--good)}
  .tone-neutral{background:var(--neutral-soft);color:var(--neutral)}
  .tone-lack{background:var(--lack-soft);color:var(--lack)}
  .tone-badge .dot{width:7px;height:7px;border-radius:50%;background:currentColor}

  .hex-card{color:#fff;border-radius:var(--radius);padding:26px 22px;margin-bottom:14px;position:relative;overflow:hidden}
  .hex-card.b-good{background:var(--good)} .hex-card.b-neutral{background:var(--neutral)} .hex-card.b-lack{background:var(--lack)}
  .hex-card .glyph{position:absolute;right:-6px;top:-18px;font-family:"Noto Serif TC",serif;font-size:130px;font-weight:700;opacity:.10;line-height:1}
  .hex-card .lab{font-size:12px;letter-spacing:.2em;opacity:.85;margin-bottom:8px}
  .hex-card .name{font-family:"Noto Serif TC",serif;font-size:34px;font-weight:700;letter-spacing:.05em;margin:0;line-height:1.2}
  .hex-card .theme{font-size:14px;opacity:.9;margin-top:4px}
  .hex-card .state{font-size:14.5px;line-height:1.75;margin-top:14px;opacity:.97}

  .between{background:var(--neutral-soft);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;
    font-size:13.5px;line-height:1.7;color:var(--neutral)}
  .between b{font-family:"Noto Serif TC",serif}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:14px}
  .panel.good-panel{background:var(--good-soft);border-color:transparent}
  .panel h3{font-family:"Noto Serif TC",serif;font-weight:500;font-size:15px;margin:0 0 10px;letter-spacing:.05em}
  .panel.good-panel h3{color:var(--good)} .panel h3{color:var(--accent)}
  .panel p{margin:0;font-size:14.5px;line-height:1.75;color:var(--ink-soft)}
  .panel p+p{margin-top:8px}
  .panel ul{margin:0;padding-left:18px}
  .panel li{font-size:14.5px;line-height:1.7;color:var(--ink-soft);margin-bottom:4px}

  .bagua-row{display:flex;align-items:center;gap:10px;margin:9px 0;font-size:13.5px}
  .bagua-row .nm{font-family:"Noto Serif TC",serif;width:26px;flex:none;color:var(--ink)}
  .bagua-row .track{flex:1;height:7px;background:var(--line);border-radius:7px;overflow:hidden}
  .bagua-row .fill{height:100%;border-radius:7px;transition:width .8s}
  .bagua-row .tag{flex:none;font-size:11px;padding:2px 9px;border-radius:999px}
  .tag.t-good{background:var(--good-soft);color:var(--good)}
  .tag.t-over,.tag.t-under{background:var(--lack-soft);color:var(--lack)}
  .tag.t-neutral{color:var(--ink-faint)}

  /* 介於兩卦：切換 */
  .hex-switch{margin-bottom:12px}
  .sw-hint{font-size:12.5px;color:var(--ink-faint);display:block;margin-bottom:8px}
  .sw-tags{display:flex;gap:10px}
  .sw-tag{flex:1;display:flex;flex-direction:column;align-items:flex-start;gap:2px;cursor:pointer;
    background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 14px;
    font-family:inherit;transition:.18s}
  .sw-tag .g{font-family:"Noto Serif TC",serif;font-size:20px;font-weight:700;color:var(--ink)}
  .sw-tag .t{font-size:12px;color:var(--ink-faint)}
  .sw-tag.on{border-color:var(--accent);background:var(--accent-soft)}
  .sw-tag.on .g{color:var(--accent)}
  .sw-tag:active{transform:scale(.98)}

  /* 八卦可展開 */
  .bagua-item{border-bottom:1px solid var(--line)}
  .bagua-item:last-child{border-bottom:none}
  .bagua-row{width:100%;background:none;border:none;font-family:inherit;cursor:pointer;
    display:flex;align-items:center;gap:10px;margin:0;padding:11px 0;font-size:13.5px}
  .bagua-row .caret{flex:none;color:var(--ink-faint);font-size:14px;transition:.25s;line-height:1}
  .bagua-item.open .caret{transform:rotate(180deg)}
  .bagua-detail{max-height:0;overflow:hidden;transition:max-height .3s ease;font-size:13px}
  .bagua-item.open .bagua-detail{max-height:160px}
  .bagua-detail .fn{color:var(--ink);font-weight:500;padding:2px 0 6px;font-family:"Noto Serif TC",serif}
  .bagua-detail .bipolar{display:flex;flex-direction:column;gap:4px;padding-bottom:12px}
  .bagua-detail .bipolar span{color:var(--ink-faint);line-height:1.5}
  .bagua-detail .bipolar span.hl{color:var(--lack);font-weight:500}

  /* 回首頁連結 */
  .home-link{display:inline-block;background:none;border:none;color:var(--ink-faint);font-family:inherit;font-size:13px;cursor:pointer;padding:0 0 14px;}
  .home-link:active{color:var(--accent)}

  /* 首頁 */
  .intro-lead{margin:8px 0 30px}
  .intro-lead p{font-size:15.5px;line-height:1.9;color:var(--ink-soft);margin:0 0 12px}
  .intro-lead .intro-quiet{color:var(--ink-faint);font-size:14px;font-family:"Noto Serif TC",serif}
  .entries{display:flex;flex-direction:column;gap:14px}
  .entry{text-align:left;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:22px 20px;cursor:pointer;font-family:inherit;transition:.18s;position:relative}
  .entry:active{transform:scale(.99)}
  .entry:hover{border-color:var(--accent)}
  .entry-title{font-family:"Noto Serif TC",serif;font-size:26px;font-weight:700;color:var(--accent);letter-spacing:.06em}
  .entry-sub{font-size:13px;color:var(--ink-faint);margin:2px 0 10px}
  .entry-desc{font-size:14px;line-height:1.7;color:var(--ink-soft);margin:0 0 12px}
  .entry-go{font-family:"Noto Serif TC",serif;font-size:14px;color:var(--accent)}

  /* 古錢 */
  .coin-wrap{margin-top:22px;text-align:center}
  .coins{display:flex;justify-content:center;gap:16px;margin-bottom:14px}
  .coin{width:60px;height:60px;border-radius:50%;border:2px solid var(--line);background:var(--card);
    display:flex;align-items:center;justify-content:center;font-family:"Noto Serif TC",serif;font-size:20px;
    color:var(--ink-faint);transition:transform .15s}
  .coin.flip{transform:rotateY(180deg) scale(.9)}
  .coin.yang{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
  .coin.yin{border-color:var(--ink-faint);color:var(--ink-soft);background:var(--paper)}
  .coin-result{font-size:14px;color:var(--ink-soft);min-height:20px;font-family:"Noto Serif TC",serif}

  /* 爻象堆疊 */
  .yao-stack{display:flex;flex-direction:column;gap:9px;padding:6px 0}
  .yao{display:flex;align-items:center;gap:10px}
  .yao .ynum{width:18px;flex:none;font-size:11px;color:var(--ink-faint);text-align:center}
  .yao .ybar{flex:1;display:flex;gap:8px;height:14px}
  .yao .yseg{flex:1;background:var(--accent);border-radius:3px}
  .yao .yseg.full{flex:1}
  .yao .ygap{width:18px;flex:none}
  .yao .yseg.ghost{background:var(--line)}
  .yao.empty .yseg{background:var(--line)}
  .yao .ychange{width:18px;flex:none;font-size:13px;color:var(--lack);text-align:center}

  .buyi-q{background:var(--accent-soft);border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:14px;color:var(--accent);line-height:1.6}
  /* 焦點面板 */
  .focus-panel{background:var(--accent-soft);border-color:transparent}
  .focus-panel h3{color:var(--accent)}
  .focus-sum{font-size:14px;color:var(--ink-soft);margin:0 0 12px!important;line-height:1.7}
  .focus-read{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
  .focus-tag{flex:none;font-size:11px;padding:2px 8px;border-radius:999px;background:var(--card);color:var(--ink-faint);margin-top:2px}
  .focus-tag.main{background:var(--accent);color:#fff}
  .focus-txt{font-size:14.5px;line-height:1.7;color:var(--ink)}
  .focus-note{margin:8px 0 0!important;font-size:12.5px!important;color:var(--ink-soft)!important}

  /* 畫面化 */
  .scene-panel{background:var(--card);border-color:var(--line)}
  .scene-panel p{margin:0;font-size:15px;line-height:1.85;color:var(--ink)}
  /* 延伸推薦 */
  .ext-panel p{font-size:13.5px;line-height:1.7;color:var(--ink-soft);margin:0 0 10px}
  .ext-chips{display:flex;flex-wrap:wrap;gap:8px}
  .ext-chip{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-soft);
    background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:6px 12px}
  .ext-chip b{font-family:"Noto Serif TC",serif;font-size:15px;color:var(--accent)}
  .ext-note{margin:12px 0 0!important;font-size:11.5px!important;color:var(--ink-faint)!important}

  /* 階段（時與位）面板 */
  .stage-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .stage-head .stage-yao{font-family:"Noto Serif TC",serif;font-size:13px;color:var(--ink-faint);border:1px solid var(--line);border-radius:999px;padding:1px 9px}
  .stage-head .stage-nm{font-family:"Noto Serif TC",serif;font-size:18px;font-weight:700;color:var(--accent)}
  .stage-head .stage-tone{margin-left:auto;font-size:12px;color:var(--ink-faint)}
  .stage-res{margin-top:12px;padding:11px 13px;border-radius:12px;font-size:13.5px;line-height:1.6}
  .stage-res .res-lab{display:block;font-size:11px;letter-spacing:.08em;margin-bottom:3px;opacity:.8}
  .stage-res.res-yes{background:var(--good-soft);color:var(--good)}
  .stage-res.res-no{background:var(--lack-soft);color:var(--lack)}
  .stage-res.res-mid{background:var(--neutral-soft);color:var(--neutral)}
  .stage-act{margin-top:12px;font-size:14.5px;line-height:1.7;color:var(--ink)}
  .stage-act .act-lab{display:block;font-family:"Noto Serif TC",serif;font-size:13px;color:var(--accent);margin-bottom:3px}

  /* 功能重點卡 */
  .fcard{padding:13px 0;border-bottom:1px solid var(--line)}
  .fcard:last-of-type{border-bottom:none}
  .fcard-head{display:flex;align-items:center;gap:9px;margin-bottom:6px}
  .fcard-head .fc-nm{font-family:"Noto Serif TC",serif;font-size:19px;font-weight:700;color:var(--ink);line-height:1}
  .fcard-head .fc-fn{font-size:13px;color:var(--ink-faint);flex:1}
  .fc-desc{margin:0;font-size:14px;line-height:1.7;color:var(--ink-soft)}
  .fc-rest{margin:12px 0 0;font-size:12.5px;color:var(--ink-faint);text-align:center}
  .tag{flex:none;font-size:11px;padding:2px 9px;border-radius:999px}

  .change{display:flex;align-items:center;gap:12px;font-family:"Noto Serif TC",serif;font-size:24px;color:var(--accent);justify-content:center;margin:4px 0 12px}
  .change .arrow{font-size:18px;color:var(--ink-faint)}
  .change-text{text-align:center;font-size:14px;color:var(--ink-soft)}
  .to-explain{margin-top:14px;padding:12px 14px;background:var(--accent-soft);border-radius:12px;text-align:center}
  .to-explain .to-name{display:block;font-family:"Noto Serif TC",serif;font-size:15px;color:var(--accent);margin-bottom:4px}
  .to-explain .to-desc{font-size:13px;color:var(--ink-soft);line-height:1.6}
  .reminder{text-align:center;font-family:"Noto Serif TC",serif;font-size:17px;line-height:1.7;color:var(--ink);padding:6px 6px 2px}
  .reminder .qm{color:var(--accent);font-size:22px}
  .disclaimer{font-size:11.5px;color:var(--ink-faint);text-align:center;margin:24px 0 0;line-height:1.7}
</style>
</head>
<body>
<div class="wrap">
  <header><span class="logo">問易</span><span class="sub">JOIN TO ENJOY</span></header>
  <p class="tagline">借古人的易經智慧，照見此刻的自己。<br>不是預測命運，而是讀懂當下、辨識下一步。</p>
  <div class="progress" id="progress"></div>
  <div id="app"></div>
</div>
<div class="bar" id="bar"></div>

<script>
/* ============================================================
   問易 v2 原型 · 三態（好／中性／缺乏）+ 回放確認
   邏輯對應「v2 判讀邏輯修正建議」。改資料表即可調判讀。
   ============================================================ */
const BAGUA={qian:"乾",kun:"坤",zhen:"震",gen:"艮",kan:"坎",li:"離",xun:"巽",dui:"兌"};
/* 八卦功能說明（功能定位 / 過強 / 不足）— 文字先用此版，內涵後續再細修 */
const BAGUA_INFO={
 qian:{fn:"創造／決策",over:"控制欲、獨斷、脫離現實",under:"缺方向、缺願景"},
 dui:{fn:"交流／分享",over:"過度社交、討好、空談",under:"封閉、不願表達"},
 li:{fn:"顯現／覺察",over:"過度分析、想太多",under:"看不清方向"},
 xun:{fn:"擴散／連結",over:"擴張失控、分心",under:"缺資源連結"},
 zhen:{fn:"啟動／突破",over:"衝動、焦躁、停不下來",under:"拖延、不敢開始"},
 kan:{fn:"收藏／恢復",over:"內耗、逃避、過度退縮",under:"不會休息、不會恢復"},
 gen:{fn:"停止／界線",over:"固執、停滯、不變通",under:"無法停止、無法拒絕"},
 kun:{fn:"承載／滋養",over:"過度承擔、失去自我",under:"缺耐心、缺穩定"},
};
const TOPICS=["最近的自己","工作或決策","關係狀態","情緒與壓力","卡住與下一步","今日狀態覺察","自由提問"];

/* ---- Step2 複選（八卦加減分）v3：八大類 × 三態 ---- */
const STATEMENT_GROUPS=[
 {label:"推進與決定",items:[
   ["我最近推得動事情，方向也算清楚",{qian:2}],
   ["做決定對我來說還算順手",{qian:1,li:1}],
   ["凡事我都想自己掌控，有點停不下來",{qian:2,kan:1}],
   ["很多事都得靠我扛，放不太下",{qian:2,gen:-1,kan:1}],
   ["我最近沒什麼方向，也提不起主張",{qian:-2}]]},
 {label:"承接與照顧",items:[
   ["我照顧人、承接事情，還算有餘裕",{kun:2,gen:1}],
   ["我承接太多，快把自己賠進去了",{kun:2,gen:-1}],
   ["別人的需求我幾乎都接，很難拒絕",{kun:1,gen:-1}],
   ["我最近有點接不住，撐得很勉強",{kun:-2}],
   ["我靜不下來，也穩不太住",{kun:-1,gen:-1}]]},
 {label:"啟動與行動",items:[
   ["我最近想做就動得起來",{zhen:2}],
   ["我有點靜不住，一直想衝、停不下來",{zhen:2,gen:-1}],
   ["我容易衝動，急著馬上開始",{zhen:2,qian:1}],
   ["我知道該動，卻一直拖著",{zhen:-2}],
   ["我有點不敢開始",{zhen:-1,kan:1}]]},
 {label:"停止與界線",items:[
   ["我停得下來，也守得住界線",{gen:2}],
   ["需要的時候，我能對人說不",{gen:1,dui:1}],
   ["我有點固執、放不下，不太變通",{gen:2,xun:-1}],
   ["我把自己封起來，不太想往前",{gen:2,kan:1}],
   ["我很難停下來，也很難拒絕",{gen:-2}]]},
 {label:"休息與恢復",items:[
   ["累的時候，我懂得讓自己緩一緩",{gen:1,kan:1}],

/* ============================================================ 引擎 */
function computeBagua(state){
 const s={};for(const k in BAGUA)s[k]=0;
 state.selected.forEach(([_,d])=>{for(const k in d)s[k]+=d[k];});
 KEYWORDS.forEach(([w,d])=>{if(w.some(x=>state.freeText.includes(x)))for(const k in d)s[k]+=d[k];});
 return s;
}
function zscores(s){
 const v=Object.values(s),mean=v.reduce((a,b)=>a+b,0)/v.length;
 const sd=Math.sqrt(v.reduce((a,b)=>a+(b-mean)**2,0)/v.length)||1;
 const z={};for(const k in s)z[k]=(s[k]-mean)/sd;
 return {z,sd,mean};
}
/* 功能層三態：good / neutral / over / under
   under 需同時「相對很低」且「真的有勾到負向句(raw<0)」，避免沒用到的功能被誤判不足 */
function functionQualities(z,s){
 const q={};
 const HIGH=3; // 絕對量門檻：要真的「用了很多」才可能算過度，避免相對最高就被冤枉
 for(const k in z){
   const val=z[k],raw=s[k];
   if(k==="kan"){ // 坎：壓力高且量夠=過度；很低且有勾負向=不足
     q[k]=(val>=0.7&&raw>=HIGH)?"over":(val<=-0.6&&raw<0?"under":"neutral");continue;}
   if(SUPPORT[k]){
     if(val>=0.6){
       if(SUPPORT[k].healthy(z,s))q[k]="good";        // 相對高 + 有配套 = 健康（可當主力）
       else if(raw>=HIGH)q[k]="over";               // 相對高 + 缺配套 + 絕對量大 = 過度
       else q[k]="neutral";                          // 缺配套但量不大 = 還好，不算過度
     }
     else if(val<=-0.6&&raw<0)q[k]="under";
     else q[k]="neutral";
   }else q[k]="neutral";
 }
 return q;
}
/* 整體基調：失衡(lack)主要由「過度」觸發；單純某功能低不算失衡（常只是沒用到）*/
function overallTone(q,sd,surplus){
 const hasOver=Object.values(q).some(v=>v==="over");
 const flat=sd<1.1;
 let tone;
 if(surplus==="C"||surplus==="D")tone="lack";   // 透支 或 過熱踩油門 = 失衡
 else if(surplus==="A")tone=hasOver?"neutral":"good";
 else tone=hasOver?"lack":(flat?"good":"neutral");
 return tone;
}
/* 主卦候選 */
function pickHex(state,z,tone){
 const cand={};const add=(n,v)=>cand[n]=(cand[n]||0)+v;
 const hi=k=>z[k]>=0.5,lo=k=>z[k]<=-0.5;
 // 八卦組合 → 13卦
 if(hi("kun")&&lo("gen"))add("節",3);
 if(hi("qian")&&lo("gen"))add("節",1);
 if(hi("kan")&&lo("zhen")){add("困",2);add("坎",2);}
 if(hi("kan"))add("坎",1);
 if(hi("gen")&&lo("zhen"))add("艮",2);
 if(hi("gen"))add("艮",1);
 if(lo("dui"))add("訟",1);
 if(hi("li"))add("離",2);
 if(hi("li")&&lo("kan"))add("未濟",1);
 if(hi("xun"))add("漸",1);
 if(hi("dui"))add("比",1);
 if(hi("kun")&&hi("dui"))add("比",2);
 // 維度
 const f=id=>{const i=FOLLOWUPS.findIndex(x=>x.id===id);return state.followups[i]&&state.followups[i].val;};
 const m=f("motion"),src=f("source"),sp=f("surplus");
 ({H:()=>{add("泰",2);add("復",1);},
   A:()=>add("困",2),B:()=>{add("節",2);add("艮",1);},C:()=>add("未濟",2),
   D:()=>{add("節",1);add("艮",1);},E:()=>{add("需",2);add("復",1);}}[m]||(()=>{}))();
 ({G:()=>{add("泰",2);add("比",1);},
   A:()=>add("困",2),B:()=>{add("訟",2);add("比",1);},C:()=>{add("需",1);add("未濟",1);},
   D:()=>{add("坎",2);add("井",1);add("復",1);},E:()=>{add("離",2);add("未濟",1);},
   F:()=>{add("漸",2);add("需",1);add("節",1);}}[src]||(()=>{}))();
 ({A:()=>{add("泰",2);add("比",1);add("復",1);},C:()=>{add("節",1);add("困",1);add("坎",1);add("艮",1);},
   D:()=>{add("節",2);add("艮",1);}}[sp]||(()=>{}))();

 if(!Object.keys(cand).length)add("離",1);
 let ranked=Object.keys(cand).sort((a,b)=>cand[b]-cand[a]);
 // 好基調 → 優先讓好態卦勝出（若有分）
 if(tone==="good"){
   const g=ranked.filter(h=>POOL_GOOD.includes(h));
   if(g.length)ranked=[...g,...ranked.filter(h=>!POOL_GOOD.includes(h))];
   else ranked=["泰",...ranked];
 }
 const main=ranked[0];
 const sec=ranked.find(h=>h!==main)||(POOL_GOOD.includes(main)?"復":"井");
 // 是否打架（前兩名接近）
 const close=ranked.length>1&&Math.abs((cand[ranked[0]]||0)-(cand[ranked[1]]||0))<=1;
 return {main,sec,close};
}
/* 你做得好的地方（必有）*/
function findHighlight(q,z){
 const goods=Object.keys(q).filter(k=>q[k]==="good");
 if(goods.length){goods.sort((a,b)=>z[b]-z[a]);return GOOD_FUNC[goods[0]];}
 // 沒有 good：挑最高、且非負面的功能溫和肯定
 const pos=Object.keys(z).filter(k=>q[k]==="neutral"&&z[k]>=0).sort((a,b)=>z[b]-z[a]);
 if(pos.length&&GOOD_FUNC[pos[0]])return GOOD_FUNC[pos[0]].replace("是你現在的資源","還在線").replace("，這其實是難得的能力","");
 return "你願意停下來，看一看自己現在的狀態——這一步本身就值得肯定。";
}
/* 可以微調的地方 */
function findAdjust(q){
 const out=[];
 for(const k in q){
   if(q[k]==="over"&&ADJ_FUNC[k+"_over"])out.push(ADJ_FUNC[k+"_over"]);
   if(q[k]==="under"&&ADJ_FUNC[k+"_under"])out.push(ADJ_FUNC[k+"_under"]);
 }
 return out.slice(0,3);
}
function computeStage(state){
 const sa=state.stage, p=state.position||"P2";
 let stage;
 if(sa==="A")stage=1; else if(sa==="B")stage=2; else if(sa==="C")stage=3;
 else if(sa==="E")stage=6; else if(sa==="D")stage=(p==="P1")?5:4; else stage=2;
 const resLevel=p==="P1"?"yes":(p==="P3"?"no":"partial");
 return {stage,position:p,resLevel};
}
function runEngine(state){
 const s=computeBagua(state);
 const {z,sd}=zscores(s);
 const q=functionQualities(z,s);
 const sp=(()=>{const i=FOLLOWUPS.findIndex(x=>x.id==="surplus");return state.followups[i]&&state.followups[i].val;})();
 const tone=overallTone(q,sd,sp);
 const {main,sec,close}=pickHex(state,z,tone);
 const {stage,position,resLevel}=computeStage(state);
 return {s,z,q,tone,main,sec,close,highlight:findHighlight(q,z),adjust:findAdjust(q),stage,position,resLevel};
}

/* 擲一爻：三枚錢，每枚 2 或 3，和 6~9 */
function tossLine(){
 const c=[0,0,0].map(()=>Math.random()<0.5?2:3);
 const sum=c[0]+c[1]+c[2];
 // 6 老陰(變)→陰；7 少陽→陽；8 少陰→陰；9 老陽(變)→陽
 return {coins:c,sum,yin:(sum===6||sum===8),changing:(sum===6||sum===9)};
}
function trigramName(bits){return TRIGRAM[bits.join("")];}
function buildHex(lines){ // lines: 由下而上 6 個 {yin,changing}
 const bit=l=>l.yin?0:1;
 const lower=trigramName([bit(lines[0]),bit(lines[1]),bit(lines[2])]);
 const upper=trigramName([bit(lines[3]),bit(lines[4]),bit(lines[5])]);
 return GUA64[upper+lower];
}
function transformedHex(lines){ // 變卦：老陰老陽翻面
 const tl=lines.map(l=>({yin:l.changing?!l.yin:l.yin}));
 const bit=l=>l.yin?0:1;
 const lower=trigramName([bit(tl[0]),bit(tl[1]),bit(tl[2])]);
 const upper=trigramName([bit(tl[3]),bit(tl[4]),bit(tl[5])]);
 return GUA64[upper+lower];
}
/* 動爻白話：用該卦卦義 × 六爻階段（沿用問易的 STAGES）*/
function yaoReading(guaName,pos){ // pos 1..6 由下而上
 const st=STAGES[pos];
 return `${guaName}卦・第${pos}爻（${st.yao}・${st.name}）：${st.hint}`;
}
/* 傳統焦點規則：依動爻數量決定該讀本卦/變卦、卦辭/某爻
   回傳 {summary, reads:[{hex, type:'卦辭'|'爻辭', pos?, primary?}], note} */
function focusRule(lines, ben, bian){
 const ch=lines.map((l,i)=>l.changing?i+1:0).filter(x=>x); // 動爻位置 1..6
 const n=ch.length;
 if(n===0) return {summary:"六爻不變，發展主軸就在本卦。",reads:[{hex:ben,type:"卦辭"}],note:"直接讀本卦的整體卦義即可。"};
 if(n===1) return {summary:"一爻變，重點看本卦這個變動的爻。",reads:[{hex:ben,type:"爻辭",pos:ch[0],primary:true}],note:""};
 if(n===2) return {summary:"二爻變，看本卦這兩個動爻，以「上面那一爻」為主。",
   reads:[{hex:ben,type:"爻辭",pos:ch[1],primary:true},{hex:ben,type:"爻辭",pos:ch[0]}],note:"上爻為主、下爻為輔。"};
 if(n===3) return {summary:"三爻變，變與不變各半，本卦與變卦的整體卦義都要看。",
   reads:[{hex:ben,type:"卦辭",primary:true},{hex:bian,type:"卦辭",primary:true}],note:"本卦看現況，變卦看趨向，並重。"};
 if(n===4){ // 讀變卦中「不變」的兩爻，下面那爻為主
   const stay=[1,2,3,4,5,6].filter(p=>!ch.includes(p));
   return {summary:"四爻變，重心已轉到變卦。看變卦中那兩個「不變」的爻，以「下面那一爻」為主。",
     reads:[{hex:bian,type:"爻辭",pos:stay[0],primary:true},{hex:bian,type:"爻辭",pos:stay[1]}],note:"看變卦的不變之爻，下爻為主。"};
 }
 if(n===5){ // 讀變卦中唯一不變的爻
   const stay=[1,2,3,4,5,6].filter(p=>!ch.includes(p))[0];
   return {summary:"五爻變，重心在變卦。看變卦中那唯一「不變」的爻。",
     reads:[{hex:bian,type:"爻辭",pos:stay,primary:true}],note:"看變卦唯一的不變之爻。"};
 }
 // n===6 六爻全變
 if(ben==="乾") return {summary:"六爻全變，本卦為純陽的乾。",reads:[{hex:"乾",type:"用九",primary:true}],note:"讀乾卦特有的「用九」。"};
 if(ben==="坤") return {summary:"六爻全變，本卦為純陰的坤。",reads:[{hex:"坤",type:"用六",primary:true}],note:"讀坤卦特有的「用六」。"};
 return {summary:"六爻全變，重心整個轉到變卦。",reads:[{hex:bian,type:"卦辭",primary:true}],note:"直接讀變卦的整體卦義。"};
}

/* ============================================================
   首頁與模式路由
   ============================================================ */
function clearAll(){prog.innerHTML="";app.innerHTML="";bar.innerHTML="";}
function backHomeLink(){
 const a=document.createElement("button");a.className="home-link";a.textContent="← 回首頁";
 a.onclick=()=>{state.mode="intro";renderIntro();};
 return a;
}
function renderIntro(){
 clearAll();
 const d=document.createElement("div");d.className="step intro";
 d.innerHTML=`
   <div class="intro-lead">
     <p>易經，是古人觀察「變化」累積下來的智慧。</p>
     <p>它不預測命運，而是幫你在當下靜下來，看清自己身處的處境——你現在是什麼狀態、走到哪個階段、下一步可以往哪。</p>
     <p class="intro-quiet">找個安靜的時刻，深吸一口氣，再開始。</p>
   </div>
   <div class="entries"></div>`;
 const en=d.querySelector(".entries");
 const make=(title,sub,desc,onClick)=>{
   const c=document.createElement("button");c.className="entry";
   c.innerHTML=`<div class="entry-title">${title}</div><div class="entry-sub">${sub}</div><p class="entry-desc">${desc}</p><span class="entry-go">進入 →</span>`;
   c.onclick=onClick;en.appendChild(c);
 };
 make("問易","以心理覺察讀懂內在",
   "透過幾個問題，看清你此刻的內在資源與處境——適合想了解自己、整理狀態時。",
   ()=>{state.mode="wenyi";Object.assign(state,{step:0,topic:null,selected:[],followups:[],stage:null,position:null,freeText:"",result:null,confirm:null,activeHex:null});render();});
 make("卜易","以古錢占問，求一卦指引",
   "靜心想著你的問題，擲六次古錢、得出一卦與變卦——適合面對抉擇、想聽聽古人怎麼說時。",
   ()=>{state.mode="buyi";Object.assign(state,{bstep:0,question:"",lines:[]});renderBuyi();});
 app.appendChild(d);
}

/* ---------- 卜易流程 ---------- */
function renderBuyi(){
 clearAll();
 if(state.bstep===0)buyiQuestion();
 else if(state.bstep===1)buyiToss();
 else buyiResult();
 window.scrollTo({top:0,behavior:"smooth"});
}
function buyiQuestion(){
 const d=document.createElement("div");d.className="step";
 d.appendChild(backHomeLink());
 d.insertAdjacentHTML("beforeend",
   `<div class="q-eyebrow">卜易 · 靜心</div><h2 class="q">先靜下來，想著你的問題</h2>
    <p class="q-hint">把心定下，將想問的事在心裡（或寫下來）想清楚。占問貴在誠，問題越具體，越能對照。</p>`);
 const ta=document.createElement("textarea");
 ta.placeholder="例如：我該不該接下這份新工作？／這段關係接下來該怎麼面對？";
 ta.value=state.question;ta.oninput=e=>state.question=e.target.value;
 d.appendChild(ta);app.appendChild(d);
 const inner=document.createElement("div");inner.className="bar-inner";
 const b=document.createElement("button");b.className="btn btn-primary";b.textContent="靜好了，開始擲錢";
 b.onclick=()=>{state.bstep=1;state.lines=[];renderBuyi();};
 inner.appendChild(b);bar.appendChild(inner);
}
function yaoSymbol(line,idx,changing){
 // 一條爻的視覺：陽=整條，陰=斷開；變爻標記
 const bar=line.yin?`<span class="yseg"></span><span class="ygap"></span><span class="yseg"></span>`:`<span class="yseg full"></span>`;
 const mark=changing?`<span class="ychange">${line.yin?"○":"✕"}</span>`:`<span class="ychange"></span>`;
 return `<div class="yao"><span class="ynum">${idx}</span><span class="ybar">${bar}</span>${mark}</div>`;
}
function buyiToss(){
 const d=document.createElement("div");d.className="step";
 d.appendChild(backHomeLink());
 const n=state.lines.length;
 d.insertAdjacentHTML("beforeend",
   `<div class="q-eyebrow">卜易 · 擲錢（${n}/6）</div><h2 class="q">擲出第 ${Math.min(n+1,6)} 爻</h2>
    <p class="q-hint">由下而上，一爻一爻擲。每擲一次＝三枚古錢，點下面的錢幣擲出。</p>`);
 // 已成的爻（由上而下顯示，但資料由下而上）
 const stack=document.createElement("div");stack.className="yao-stack";
 for(let i=5;i>=0;i--){
   if(state.lines[i])stack.insertAdjacentHTML("beforeend",yaoSymbol(state.lines[i],i+1,state.lines[i].changing));
   else stack.insertAdjacentHTML("beforeend",`<div class="yao empty"><span class="ynum">${i+1}</span><span class="ybar"><span class="yseg ghost"></span></span><span class="ychange"></span></div>`);
 }
 d.appendChild(stack);

 // 古錢區
 const coinWrap=document.createElement("div");coinWrap.className="coin-wrap";
 coinWrap.innerHTML=`<div class="coins"><span class="coin">？</span><span class="coin">？</span><span class="coin">？</span></div>
   <div class="coin-result"></div>`;
 d.appendChild(coinWrap);
 app.appendChild(d);

 const inner=document.createElement("div");inner.className="bar-inner";
 const b=document.createElement("button");b.className="btn btn-primary";
 b.textContent=n<6?"擲這一爻":"看結果";
 b.onclick=()=>{
   if(state.lines.length>=6){state.bstep=2;renderBuyi();return;}
   const line=tossLine();
   const coinEls=coinWrap.querySelectorAll(".coin");
   coinEls.forEach((c,i)=>{c.classList.add("flip");setTimeout(()=>{c.textContent=line.coins[i]===3?"陽":"陰";c.className="coin "+(line.coins[i]===3?"yang":"yin");},150);});
   const names={6:"老陰（變爻）",7:"少陽",8:"少陰",9:"老陽（變爻）"};
   coinWrap.querySelector(".coin-result").textContent=`第 ${state.lines.length+1} 爻：${line.sum} · ${names[line.sum]}`;
   state.lines.push(line);
   setTimeout(()=>renderBuyi(),650); // 重繪，堆上新爻、更新計數
 };
 inner.appendChild(b);bar.appendChild(inner);
}
function buyiResult(){
 const d=document.createElement("div");d.className="step report";
 d.appendChild(backHomeLink());
 const ben=buildHex(state.lines);
 const changingPos=state.lines.map((l,i)=>l.changing?i+1:0).filter(x=>x);
 const bian=changingPos.length?transformedHex(state.lines):null;

 d.insertAdjacentHTML("beforeend",`<div class="q-eyebrow" style="margin-top:6px">卜易 · 卦象</div>`);
 if(state.question.trim()){
   const qb=document.createElement("div");qb.className="buyi-q";qb.textContent=`你問：${state.question.trim()}`;d.appendChild(qb);
 }

 // 本卦卡
 const hc=document.createElement("div");hc.className="hex-card b-neutral";
 hc.innerHTML=`<span class="glyph">${ben}</span><div class="lab">本卦 · 你目前的處境</div>
   <h2 class="name">${ben}</h2><div class="state">${GUA_MEAN[ben]||""}</div>`;
 d.appendChild(hc);

 // 卦象六爻圖
 const fig=document.createElement("div");fig.className="panel";
 const stack=document.createElement("div");stack.className="yao-stack";
 for(let i=5;i>=0;i--)stack.insertAdjacentHTML("beforeend",yaoSymbol(state.lines[i],i+1,state.lines[i].changing));
 fig.innerHTML=`<h3>你擲出的卦</h3>`;fig.appendChild(stack);
 d.appendChild(fig);

 // 變卦（先呈現兩卦關係）
 if(bian){
   const bc=document.createElement("div");bc.className="panel";
   bc.innerHTML=`<h3>變卦 · 事情的趨向</h3>
     <div class="change">${ben}<span class="arrow">→</span>${bian}</div>
     <div class="to-explain"><span class="to-name">${bian}</span><span class="to-desc">${GUA_MEAN[bian]||""}</span></div>
     <p style="margin-top:12px;text-align:center;font-size:12px;color:var(--ink-faint)">由動爻推出的變卦，代表事情可能發展的方向。</p>`;
   d.appendChild(bc);
 }

 // 焦點：依動爻數量的傳統規則，指出該讀哪裡
 const f=focusRule(state.lines,ben,bian);
 const readBlock=r=>{
   if(r.type==="卦辭")return `${r.hex}卦的整體：${GUA_MEAN[r.hex]||""}`;
   if(r.type==="爻辭")return yaoReading(r.hex,r.pos);
   if(r.type==="用九")return "用九（乾卦六爻全變）：剛強到了極點，最好的姿態反而是不爭為首、收斂鋒芒、柔和處之，事情更能成。";
   if(r.type==="用六")return "用六（坤卦六爻全變）：柔順到了極點，要守住正道、長久持守，以靜制動，自有其吉。";
   return "";
 };
 const fp=document.createElement("div");fp.className="panel focus-panel";
 let fInner=`<h3>這一卦，重點看哪裡</h3><p class="focus-sum">${f.summary}</p>`;
 f.reads.forEach(r=>{
   const tag=f.reads.length>1?`<span class="focus-tag ${r.primary?'main':''}">${r.primary?'主':'輔'}</span>`:"";
   fInner+=`<div class="focus-read">${tag}<span class="focus-txt">${readBlock(r)}</span></div>`;
 });
 if(f.note)fInner+=`<p class="focus-note">${f.note}</p>`;
 fInner+=`<p class="ext-note">解讀為現代白話詮釋；傳統《周易》卦辭、爻辭原文可另行對照。</p>`;
 fp.innerHTML=fInner;
 d.appendChild(fp);

 const dis=document.createElement("p");dis.className="disclaimer";
 dis.innerHTML=`卜易是一面幫你靜心、換個角度思考的鏡子，不是命運的定論。最終的選擇與行動，仍在你自己手上。`;
 d.appendChild(dis);
 app.appendChild(d);

 const inner=document.createElement("div");inner.className="bar-inner";
 const home=document.createElement("button");home.className="btn-ghost";home.textContent="回首頁";
 home.onclick=()=>{state.mode="intro";renderIntro();};
 const again=document.createElement("button");again.className="btn btn-primary";again.textContent="再卜一次";
 again.onclick=()=>{Object.assign(state,{bstep:0,question:"",lines:[]});renderBuyi();};
 inner.appendChild(home);inner.appendChild(again);bar.appendChild(inner);
}

state.mode="intro";state.bstep=0;state.question="";state.lines=[];
renderIntro();
</script>
</body>
</html>
